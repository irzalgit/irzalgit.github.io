<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaksi Sedang Diproses</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; text-align: center; }
#status { font-size: 18px; margin-top: 20px; font-weight: bold; }
a { display: block; margin-top: 15px; font-size: 16px; color: blue; }
</style>
</head>
<body>

<h2>Transaksi Anda Sedang Diproses</h2>
<p>Jangan tutup halaman ini.</p>

<div id="status">Menunggu konfirmasi pembayaran...</div>
<div id="payLink"></div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const billNo = urlParams.get('billNo');
const msisdn = urlParams.get('msisdn');

const statusDiv = document.getElementById('status');
const payLinkDiv = document.getElementById('payLink');

if (!billNo || !msisdn) {
  statusDiv.textContent = "Parameter billNo dan msisdn tidak ditemukan!";
} else {
  const checkPayment = async () => {
    try {
      const res = await fetch(`/api/cek-status?billNo=${billNo}&msisdn=${msisdn}`);
      const data = await res.json();

      if (!data.success) {
        statusDiv.textContent = "Gagal cek status pembayaran. Menunggu...";
        return;
      }

      if (data.paid) {
        statusDiv.textContent = "✅ Pembayaran berhasil!";
        payLinkDiv.innerHTML = `Tanggal Bayar: ${data.paymentDate || '-'}<br>Invoice ID: ${billNo}`;
      } else {
        statusDiv.textContent = "💳 Belum dibayar. Silakan klik link berikut untuk bayar:";
        payLinkDiv.innerHTML = `<a href="${data.redirectUrl}" target="_blank">Bayar Sekarang</a>`;
      }
    } catch (err) {
      statusDiv.textContent = "Error cek status: " + err.message;
    }
  };

  // Pertama kali cek status
  checkPayment();

  // Cek setiap 5 detik sampai pembayaran berhasil
  const intervalId = setInterval(async () => {
    const res = await fetch(`/api/cek-status?billNo=${billNo}&msisdn=${msisdn}`);
    const data = await res.json();

    if (data.success && data.paid) {
      statusDiv.textContent = "✅ Pembayaran berhasil!";
      payLinkDiv.innerHTML = `Tanggal Bayar: ${data.paymentDate || '-'}<br>Invoice ID: ${billNo}`;
      clearInterval(intervalId); // berhenti cek otomatis
    }
  }, 5000);
}
</script>

</body>
</html>
