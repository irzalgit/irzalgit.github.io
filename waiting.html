<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Pembayaran</title>
<style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; }
    h2 { margin-bottom: 10px; }
    #statusBox {
        margin-top: 20px; padding: 20px;
        border-radius: 10px; font-size: 18px;
        font-weight: bold;
    }
    .pending { background: #fff3cd; color: #856404; }
    .paid { background: #d4edda; color: #155724; }
    .expired { background: #f8d7da; color: #721c24; }
    button {
        margin-top: 25px; padding: 12px 20px;
        border: none; border-radius: 8px;
        background: #007bff; color: white; font-size: 16px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>Memeriksa Status Pembayaran...</h2>
<div id="statusBox" class="pending">Menunggu pembayaran...</div>
<button id="backBtn" style="display:none;" onclick="window.location.href='index.html'">
    Kembali ke Beranda
</button>

<script>
// --- Ambil bill_no dari URL ---
const urlParams = new URLSearchParams(window.location.search);
const bill_no = urlParams.get("bill_no");

const statusBox = document.getElementById("statusBox");
const backBtn = document.getElementById("backBtn");

if (!bill_no) {
    statusBox.textContent = "bill_no tidak ditemukan!";
    statusBox.className = "expired";
    backBtn.style.display = "block";
} else {

    async function checkStatus() {
        try {
            const response = await fetch(
                `https://math315.vercel.app/api/payment-status?bill_no=${bill_no}`
            );

            // Jika API tidak merespon (server error)
            if (!response.ok) {
                statusBox.textContent = "Gagal mengambil status dari server.";
                statusBox.className = "expired";
                backBtn.style.display = "block";
                return;
            }

            const data = await response.json();

            if (!data.success) {
                statusBox.textContent = "Gagal mengambil status transaksi.";
                statusBox.className = "expired";
                backBtn.style.display = "block";
                return;
            }

            // --- STATUS HANDLING ---
            if (data.status === "pending") {
                statusBox.textContent = "Menunggu pembayaran...";
                statusBox.className = "pending";
            }

            if (data.status === "paid") {
                statusBox.textContent = "✓ Pembayaran Berhasil!";
                statusBox.className = "paid";
                clearInterval(statusLoop);
                backBtn.style.display = "block";
            }

            if (data.status === "expired") {
                statusBox.textContent = "❌ Pembayaran Expired / Dibatalkan";
                statusBox.className = "expired";
                clearInterval(statusLoop);
                backBtn.style.display = "block";
            }

        } catch (err) {
            statusBox.textContent = "Error: " + err.message;
            statusBox.className = "expired";
            backBtn.style.display = "block";
        }
    }

    // Eksekusi pertama kali
    checkStatus();

    // Polling setiap 5 detik
    const statusLoop = setInterval(checkStatus, 5000);
}
</script>

</body>
</html>
